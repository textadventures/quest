<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quest Viva</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script type="text/javascript">
        // Runs before the start screen is parsed, so when a game is specified via the
        // URL we paint straight into the loading state — otherwise the file/URL
        // pickers render for a frame before showLoading() gets a chance to hide them.
        (function () {
            var params = new URLSearchParams(location.search);
            if (params.get('id') || params.get('url') || params.get('source') === 'editor') {
                document.documentElement.classList.add('qv-booting');
            }
        })();
    </script>
    <style type="text/css">
        html.qv-booting #qv-pickers { display: none; }
        html.qv-booting #qv-loading-msg { display: flex; }
    </style>
    <script type="text/javascript" src="lib/jquery-2.1.1.min.js"></script>
    <script type="text/javascript" src="lib/jquery-ui.min.js"></script>
    <script type="text/javascript" src="lib/jquery.multi-open-accordion-1.5.3.js"></script>
    <link rel="stylesheet" type="text/css" href="lib/jquery-ui.min.css" />
    <link rel="stylesheet" type="text/css" href="playercore.css" />
    <!-- App-chrome styles (start screen, debugger, save-slot manager). Built from
         styles/chrome.css via `npm run build` — see WasmPlayer/package.json. All of
         its rules are contained to `.qv-chrome` subtrees so they can't affect the
         game UI above (playercore.css / jQuery UI). -->
    <link rel="stylesheet" type="text/css" href="chrome.css" />
    <script type="text/javascript" src="playercore.js"></script>
    <script type="text/javascript" src="player.js"></script>
    <script type="text/javascript" src="lib/paper.js"></script>
    <script type="text/javascript" src="quest-config.js"></script>
    <script type="text/javascript" src="wasm-player.js"></script>
</head>
<body>
<div id="qv-start" class="qv-chrome">
    <div class="card preset-filled-surface-100-900 w-full max-w-md p-8 space-y-6" data-theme="wintry">
        <div>
            <h1 class="h2 flex items-center gap-4">
                <img src="logo.svg" alt="" class="h-7" />
                Quest Viva
            </h1>
        </div>

        <div id="qv-error" class="hidden card preset-tonal-error p-4 text-sm"></div>

        <div id="qv-pickers" class="space-y-4">
            <div>
                <span class="label-text text-xs uppercase tracking-wide text-surface-500">Open a game file</span>
                <button id="qv-file-btn" type="button" class="btn preset-tonal-primary w-full justify-start mt-2">
                    &#128193; Choose file (.quest, .aslx, .asl, .cas)
                </button>
                <input type="file" id="qv-file-input" class="hidden" accept=".quest,.aslx,.asl,.cas">
            </div>

            <div class="flex items-center gap-3 text-surface-500 text-xs">
                <hr class="hr flex-1">
                or
                <hr class="hr flex-1">
            </div>

            <div>
                <label class="label-text text-xs uppercase tracking-wide text-surface-500" for="qv-url-input">Load from URL</label>
                <div class="flex gap-2 mt-2">
                    <input type="url" id="qv-url-input" class="input" placeholder="https://&hellip;" autocomplete="off" spellcheck="false">
                    <button id="qv-url-btn" type="button" class="btn preset-filled-primary-500">Load</button>
                </div>
            </div>
        </div>

        <div id="qv-loading-msg" class="hidden flex-col items-center gap-3 text-surface-500 text-sm text-center">
            <div class="animate-spin rounded-full h-8 w-8 border-2 border-surface-400-600 border-t-transparent" aria-hidden="true"></div>
            <span>Loading&hellip;</span>
        </div>
    </div>
</div>

<dialog id="qv-saves" class="qv-chrome" data-mode="boot">
    <div class="card preset-filled-surface-100-900 w-full p-6 space-y-4" data-theme="wintry">
        <h2 class="h3" data-mode-text="boot">Continue your game?</h2>
        <h2 class="h3 qv-manage-only" data-mode-text="manage">Save / Load</h2>

        <div id="qv-saves-error" class="hidden card preset-tonal-error p-3 text-sm"></div>

        <button id="qv-saves-start-new" type="button" class="qv-boot-only btn preset-tonal-primary w-full justify-start">
            Start from the beginning
        </button>

        <ul id="qv-saves-list" class="space-y-2"></ul>

        <div class="qv-manage-only space-y-3">
            <hr class="hr">
            <div class="flex gap-2">
                <input id="qv-saves-name-input" class="input" type="text" placeholder="Save name" autocomplete="off">
                <button id="qv-saves-save-new" type="button" class="btn preset-filled-primary-500">Save new</button>
            </div>
            <div class="flex gap-2">
                <button id="qv-saves-download" type="button" class="btn preset-tonal-primary flex-1">Save to file</button>
                <button id="qv-saves-upload-btn" type="button" class="btn preset-tonal-primary flex-1">Load from file</button>
                <input type="file" id="qv-saves-file-input" class="hidden" accept=".quest-save">
            </div>
            <button id="qv-saves-close" type="button" class="btn preset-tonal-surface w-full">Close</button>
        </div>
    </div>
</dialog>
</body>
</html>
