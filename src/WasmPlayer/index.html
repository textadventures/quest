<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quest Viva</title>
    <script type="text/javascript" src="lib/jquery-2.1.1.min.js"></script>
    <script type="text/javascript" src="lib/jquery-ui.min.js"></script>
    <script type="text/javascript" src="lib/jquery.multi-open-accordion-1.5.3.js"></script>
    <link rel="stylesheet" type="text/css" href="lib/jquery-ui.min.css" />
    <link rel="stylesheet" type="text/css" href="playercore.css" />
    <script type="text/javascript" src="playercore.js"></script>
    <script type="text/javascript" src="player.js"></script>
    <script type="text/javascript" src="lib/paper.js"></script>
    <script type="text/javascript" src="wasm-player.js"></script>
    <script>
        function addPaperScript() {
            const canvas = document.getElementById('gridCanvas');
            const gridPanel = document.getElementById('gridPanel');
            if (canvas instanceof HTMLCanvasElement && gridPanel) {
                gridPanel.appendChild(canvas);
                canvas.style.display = '';
                if (window.paper && paper.view) {
                    paper.view.viewSize = new paper.Size(canvas.clientWidth, canvas.clientHeight);
                }
            }
        }
    </script>
</head>
<body>
<div id="gameBorder" style="display: none">
    <div class="ui-widget-header" id="qv-status">
        <div id="controlButtons">
            <button id="cmdDebug" style="display: none" type="button">Debug</button>
            <button id="cmdSave" type="button">Save</button>
            <button id="cmdShowPanes" type="button">&#9776;</button>
        </div>
        <div id="location">
        </div>
    </div>
    <div id="sidebar">
        <div id="gamePanes" style="background:transparent;">
            <div id="gamePanesRunning">
                <h3 id="inventoryLabel"><span class="accordion-header-text">Inventory</span></h3>
                <div id="inventoryAccordion">
                    <div class="elementListWrapper" id="inventoryWrapper">
                        <ol class="elementList" id="lstInventory">
                        </ol>
                    </div>
                    <div class="verbButtons">
                        <button id="cmdInventory1" onclick="paneButtonClick('#lstInventory',$(this));" style="display:none" type="button"></button>
                        <button id="cmdInventory2" onclick="paneButtonClick('#lstInventory',$(this));" style="display:none" type="button"></button>
                        <button id="cmdInventory3" onclick="paneButtonClick('#lstInventory',$(this));" style="display:none" type="button"></button>
                        <button id="cmdInventory4" onclick="paneButtonClick('#lstInventory',$(this));" style="display:none" type="button"></button>
                        <button id="cmdInventory5" onclick="paneButtonClick('#lstInventory',$(this));" style="display:none" type="button"></button>
                        <button id="cmdInventory6" onclick="paneButtonClick('#lstInventory',$(this));" style="display:none" type="button"></button>
                        <button id="cmdInventory7" onclick="paneButtonClick('#lstInventory',$(this));" style="display:none" type="button"></button>
                        <button id="cmdInventory8" onclick="paneButtonClick('#lstInventory',$(this));" style="display:none" type="button"></button>
                        <button id="cmdInventory9" onclick="paneButtonClick('#lstInventory',$(this));" style="display:none" type="button"></button>
                    </div>
                </div>
                <h3 id="statusVarsLabel"><span class="accordion-header-text">Status</span></h3>
                <div id="statusVarsAccordion">
                    <div id="statusVars">
                    </div>
                </div>
                <h3 id="placesObjectsLabel"><span class="accordion-header-text">Places and Objects</span></h3>
                <div id="placesObjectsAccordion">
                    <div class="elementListWrapper" id="placesObjectsWrapper">
                        <ol class="elementList" id="lstPlacesObjects">
                        </ol>
                    </div>
                    <div class="verbButtons" id="placesObjectsButtons">
                        <button id="cmdPlacesObjects1" onclick="paneButtonClick('#lstPlacesObjects',$(this));" style="display:none" type="button"></button>
                        <button id="cmdPlacesObjects2" onclick="paneButtonClick('#lstPlacesObjects',$(this));" style="display:none" type="button"></button>
                        <button id="cmdPlacesObjects3" onclick="paneButtonClick('#lstPlacesObjects',$(this));" style="display:none" type="button"></button>
                        <button id="cmdPlacesObjects4" onclick="paneButtonClick('#lstPlacesObjects',$(this));" style="display:none" type="button"></button>
                        <button id="cmdPlacesObjects5" onclick="paneButtonClick('#lstPlacesObjects',$(this));" style="display:none" type="button"></button>
                        <button id="cmdPlacesObjects6" onclick="paneButtonClick('#lstPlacesObjects',$(this));" style="display:none" type="button"></button>
                        <button id="cmdPlacesObjects7" onclick="paneButtonClick('#lstPlacesObjects',$(this));" style="display:none" type="button"></button>
                        <button id="cmdPlacesObjects8" onclick="paneButtonClick('#lstPlacesObjects',$(this));" style="display:none" type="button"></button>
                        <button id="cmdPlacesObjects9" onclick="paneButtonClick('#lstPlacesObjects',$(this));" style="display:none" type="button"></button>
                    </div>
                </div>
                <div class="ui-helper-reset ui-widget ui-state-active" id="commandPane"
                     style="border-radius: 5px;text-align:center;display:none;padding:2px;min-height: 25px;margin-top:10px; border-top:1px solid rgb(121, 183, 231)">
                    <h3 id="commandPaneHeading"><span class="accordion-header-text">Commands</span></h3>
                </div>
                <div class="ui-helper-reset ui-widget ui-state-active" id="customStatusPane"
                     style="border-radius: 5px;text-align:center;display:none;padding:2px;min-height: 25px;margin-top:10px; border-top:1px solid rgb(121, 183, 231)">
                    <h3><span class="accordion-header-text">Status</span></h3>
                </div>
                <h3 id="compassLabel"><span class="accordion-header-text">Compass</span></h3>
                <div id="compassAccordion">
                    <table id="compassTable">
                        <tr>
                            <td>
                                <table>
                                    <tr>
                                        <td><button class="compassbutton" id="cmdCompassNW" onclick="compassClick(_compassDirs[0]);" title="go northwest" type="button"></button></td>
                                        <td><button class="compassbutton" id="cmdCompassN" onclick="compassClick(_compassDirs[1]);" title="go north" type="button"></button></td>
                                        <td><button class="compassbutton" id="cmdCompassNE" onclick="compassClick(_compassDirs[2]);" title="go northeast" type="button"></button></td>
                                    </tr>
                                    <tr>
                                        <td><button class="compassbutton" id="cmdCompassW" onclick="compassClick(_compassDirs[3]);" title="go west" type="button"></button></td>
                                        <td>&nbsp;</td>
                                        <td><button class="compassbutton" id="cmdCompassE" onclick="compassClick(_compassDirs[4]);" title="go east" type="button"></button></td>
                                    </tr>
                                    <tr>
                                        <td><button class="compassbutton" id="cmdCompassSW" onclick="compassClick(_compassDirs[5]);" title="go southwest" type="button"></button></td>
                                        <td><button class="compassbutton" id="cmdCompassS" onclick="compassClick(_compassDirs[6]);" title="go south" type="button"></button></td>
                                        <td><button class="compassbutton" id="cmdCompassSE" onclick="compassClick(_compassDirs[7]);" title="go southeast" type="button"></button></td>
                                    </tr>
                                </table>
                            </td>
                            <td>
                                <table>
                                    <tr>
                                        <td><button class="compassbutton" id="cmdCompassU" onclick="compassClick(_compassDirs[8]);" title="go up" type="button"></button></td>
                                        <td><button class="compassbutton" id="cmdCompassIn" onclick="compassClick(_compassDirs[10]);" title="go in" type="button">in</button></td>
                                    </tr>
                                    <tr>
                                        <td><button class="compassbutton" id="cmdCompassD" onclick="compassClick(_compassDirs[9]);" title="go down" type="button"></button></td>
                                        <td><button class="compassbutton" id="cmdCompassOut" onclick="compassClick(_compassDirs[11]);" title="go out" type="button">out</button></td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                    </table>
                </div>
            </div>
            <div id="gamePanesFinished">
                <h2>Game Over</h2>
                <p>This game has finished.</p>
            </div>
        </div>
    </div>
    <div id="gamePanel"></div>
    <div id="gridPanel"></div>
    <div id="gameContent">
        <div id="divOutput">
            <div data-divcount="0" id="outputData" style="display: none"></div>
            <h1 id="gameTitle">Loading...</h1>
        </div>
        <div id="txtCommandSpacer"></div>
        <div id="endWaitDiv">
            <a class="cmdlink" id="endWaitLink" onclick="endWait();" style="display: none">Continue...</a>
        </div>
        <div id="txtCommandDiv">
            <div id="txtCommandContainer">
                <span id="txtCommandPrompt"></span>
                <input autofocus id="txtCommand" onkeydown="return commandKey(event);" placeholder="Type here..." type="text" />
            </div>
        </div>
    </div>
</div>
<div id="dialog" title="Menu">
    <p id="dialogCaption"></p>
    <select id="dialogOptions" size="3"></select>
</div>
<div id="msgbox" title="Question">
    <p id="msgboxCaption"></p>
</div>
</body>
</html>
