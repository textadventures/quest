name: Publish Electron desktop app

# Runs when a version tag is pushed (e.g. v6.0.0-beta.30, normally via
# release-please merging its release PR), same trigger as docker-publish.yml,
# nuget-publish.yml, and deploy-play.yml — builds on all three OSes and
# attaches the unsigned installers/AppImage to the GitHub Release
# release-please already created. See docs/electron-desktop-app.md.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact-glob: "*.dmg"
          - os: windows-latest
            artifact-glob: "*.exe"
          - os: ubuntu-latest
            artifact-glob: "{*.AppImage,*.deb}"
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches VERSION file
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "❌ Tag $GITHUB_REF_NAME does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install .NET WASM workload
        run: dotnet workload install wasm-tools

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            src/AppShell/package-lock.json
            src/ElectronApp/package-lock.json

      - name: Build WasmEditor
        run: dotnet build src/WasmEditor/WasmEditor.csproj -c Release

      - name: Build WasmPlayer
        run: dotnet build src/WasmPlayer/WasmPlayer.csproj -c Release

      - name: Build AppShell
        run: npm ci && npm run build
        working-directory: src/AppShell
        env:
          PUBLIC_APPSHELL_VERSION: ${{ github.ref_name }}
          PUBLIC_HAS_SERVER: false
          PUBLIC_SHOW_HOME: true

      - name: Write Apple API key for notarization
        # electron-builder's APPLE_API_KEY env var wants a file path, not the
        # key content itself, so decode the secret to disk first. Mac-only —
        # the App Store Connect API key isn't used to sign the Windows/Linux
        # targets, which have no equivalent step.
        if: matrix.os == 'macos-latest'
        shell: bash
        run: echo "${{ secrets.APPLE_API_KEY_P8 }}" | base64 -d > "${{ runner.temp }}/AuthKey.p8"

      - name: Build and package Electron app
        run: npm ci && npm run dist
        working-directory: src/ElectronApp
        env:
          # copy-static.mjs defaults to Debug; the AOT/Release AppBundles are
          # what's actually built above, so it needs to look there instead.
          # Set via env (not inline `VAR=value` shell syntax) since the
          # windows-latest runner in this matrix defaults to pwsh, not bash.
          WASM_CONFIG: Release
          # Developer ID signing + notarization, macOS only — ternaries keep
          # these unset (rather than pointing electron-builder at a macOS
          # .p12/API key) on the Windows/Linux legs of this matrix, which have
          # their own unrelated signing story. scripts/adhoc-sign.js already
          # no-ops itself once CSC_LINK is set, so no change needed there.
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.MAC_CSC_KEY_PASSWORD || '' }}
          APPLE_API_KEY: ${{ matrix.os == 'macos-latest' && format('{0}/AuthKey.p8', runner.temp) || '' }}
          APPLE_API_KEY_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_KEY_ID || '' }}
          APPLE_API_ISSUER: ${{ matrix.os == 'macos-latest' && secrets.APPLE_API_ISSUER || '' }}

      - name: Attach build to GitHub Release
        # release-please creates the GitHub Release itself (with changelog-based
        # notes) before pushing the tag that triggers this workflow, so just
        # upload assets to it rather than creating a new one. shell: bash so
        # the glob is expanded consistently (incl. on windows-latest, via Git
        # Bash) rather than relying on gh itself or pwsh to expand it.
        if: github.ref_type == 'tag'
        shell: bash
        run: gh release upload ${{ github.ref_name }} src/ElectronApp/release/${{ matrix.artifact-glob }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
