name: release-please

# Maintains an up-to-date "release PR" that bumps VERSION and CHANGELOG.md
# from Conventional Commits-formatted PR titles merged to main. Merging that
# release PR is the release: this job tags it directly (v6.0.0-beta.N), which
# in turn triggers docker-publish.yml, nuget-publish.yml, and deploy-play.yml
# — no manual release.sh run needed.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}

      # release-please-config.json sets prerelease: true so the "prerelease"
      # versioning strategy keeps bumping the trailing beta.N instead of
      # graduating out of it (that config key drives both the version-bump
      # logic and the GitHub Release's prerelease flag). Un-flag the release
      # itself here so it isn't structurally excluded from ever holding
      # "Latest" — but draft it rather than publish it: deploy-play.yml and
      # electron-publish.yml (triggered by the tag push, already fired by
      # release-please-action's creation of this release above — drafting
      # afterward doesn't affect that) still need to attach their installers,
      # and electron-publish.yml's macOS leg (code signing + notarization)
      # can take 15+ minutes. A public visitor hitting releases/latest during
      # that window would otherwise see a release missing some/all installers.
      # electron-publish.yml's own final job un-drafts (and marks --latest)
      # once every OS leg has successfully uploaded — see its "finalize" job.
      - name: Un-prerelease and draft the release
        if: ${{ steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: gh release edit "${{ steps.release.outputs.tag_name }}" --prerelease=false --draft=true --repo ${{ github.repository }}
