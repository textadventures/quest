name: Deploy play.questviva.com and WebEditor

# Runs when a version tag is pushed (e.g. v6.0.0-beta.30, normally via
# release-please merging its release PR), keeping play.questviva.com on the
# same release cadence as the WebPlayer Docker image. Tag pushes also attach
# WasmPlayer/AppBundle/WebEditor build artifacts to the GitHub Release
# release-please already created and dispatch a deploy to
# textadventures.co.uk, so a single release cadence drives both
# play.questviva.com and the WebEditor on textadventures.co.uk.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      deployments: write
    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches VERSION file
        if: github.ref_type == 'tag'
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          FILE_VERSION="$(cat VERSION)"
          if [ "$TAG_VERSION" != "$FILE_VERSION" ]; then
            echo "❌ Tag $GITHUB_REF_NAME does not match VERSION file ($FILE_VERSION)"
            exit 1
          fi

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install .NET WASM workload
        run: dotnet workload install wasm-tools

      - name: Build WasmEditor
        run: dotnet build src/WasmEditor/WasmEditor.csproj -c Release

      - name: Build WasmPlayer
        run: dotnet build src/WasmPlayer/WasmPlayer.csproj -c Release

      - name: Build WebEditor
        run: npm ci && npm run build
        working-directory: src/WebEditor
        env:
          PUBLIC_WEBEDITOR_VERSION: ${{ github.sha }}
          BASE_PATH: /editor
          PUBLIC_HAS_SERVER: false

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/AppBundle deploy/player deploy/editor
          cp -r src/Home/. deploy/
          cp VERSION deploy/VERSION
          cp -r src/WebEditor/build/. deploy/editor/
          cp -r src/WasmEditor/bin/Release/net10.0/browser-wasm/AppBundle/. deploy/AppBundle/
          cp -r src/WasmPlayer/bin/Release/net10.0/browser-wasm/AppBundle/. deploy/player/
          cat > deploy/_headers <<'EOF'
          /player/_framework/*
            Cache-Control: no-cache

          /AppBundle/_framework/*
            Cache-Control: no-cache

          /*.js
            Content-Type: application/javascript; charset=utf-8
          EOF

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy --project-name=play-questviva --branch=main

      - name: Package WasmPlayer artifact
        run: (cd src/WasmPlayer/bin/Release/net10.0/browser-wasm/AppBundle && zip -r $GITHUB_WORKSPACE/WasmPlayer.zip .)

      # WebEditor's build bakes BASE_PATH into its assets, so it needs a second
      # build for textadventures.co.uk's /questviva path (WasmEditor's output
      # isn't BASE_PATH-sensitive, so the earlier build is reused as-is).
      - name: Build WebEditor for textadventures.co.uk
        if: github.ref_type == 'tag'
        run: npm run build
        working-directory: src/WebEditor
        env:
          PUBLIC_WEBEDITOR_VERSION: ${{ github.ref_name }}
          BASE_PATH: /questviva
          PUBLIC_HAS_SERVER: true

      - name: Package editor artifacts for textadventures.co.uk
        if: github.ref_type == 'tag'
        run: |
          (cd src/WasmEditor/bin/Release/net10.0/browser-wasm/AppBundle && zip -r $GITHUB_WORKSPACE/AppBundle.zip .)
          (cd src/WebEditor/build && zip -r $GITHUB_WORKSPACE/WebEditor.zip .)

      - name: Attach player and editor builds to GitHub Release
        # release-please creates the GitHub Release itself (with changelog-based
        # notes) before pushing the tag that triggers this workflow, so just
        # upload assets to it rather than creating a new one.
        if: github.ref_type == 'tag'
        run: gh release upload ${{ github.ref_name }} WasmPlayer.zip AppBundle.zip WebEditor.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Pin WebEditor version in textadventures.co.uk
        if: github.ref_type == 'tag'
        run: |
          curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            -H "Authorization: token ${{ secrets.TA_DEPLOY_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/alexwarren/textadventures.co.uk/actions/variables/WEBEDITOR_VERSION" \
            -d "{\"name\":\"WEBEDITOR_VERSION\",\"value\":\"${{ github.ref_name }}\"}"

      - name: Trigger textadventures.co.uk deployment
        if: github.ref_type == 'tag'
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.TA_DEPLOY_PAT }}
          repository: alexwarren/textadventures.co.uk
          event-type: webeditor-release
          client-payload: '{"tag": "${{ github.ref_name }}"}'
