name: Build and test

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
      - "tests/**"
      - "site/**"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: site

      - name: Build
        run: npm run build
        working-directory: site

  build_webeditor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v7

      # Matches the node-version deploy-play.yml uses to build WebEditor for
      # release, so a lockfile that only resolves cleanly on a contributor's
      # local platform gets caught here instead of on release day.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/WebEditor/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: src/WebEditor

      - name: Build
        run: npm run build
        working-directory: src/WebEditor
        env:
          PUBLIC_WEBEDITOR_VERSION: ${{ github.sha }}
          BASE_PATH: /editor

  build_and_test:
    runs-on: ubuntu-latest

    steps:
      # Check out the repo so the workflow can access it
      - name: Check out repository code
        uses: actions/checkout@v7

      # Set up the .NET SDK (change to the specific version you’re using)
      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      # Restore dependencies
      - name: Restore dependencies
        run: dotnet restore

      # Build the project
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Run tests
      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal
